<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 다국어 문서 분석 및 번역 시스템</title>
    <meta name="description" content="문서 및 이미지를 AI로 즉시 번역하고 핵심 내용을 분석해 줍니다.">
    
    <style>
        body { font-family: 'Arial', sans-serif; padding: 20px; max-width: 800px; margin: auto; }
        .control-panel { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
        .result-section { border: 1px solid #ccc; padding: 20px; border-radius: 8px; background: #f9f9f9; }
        button, select, input { padding: 8px; border-radius: 4px; border: 1px solid #ccc; }
        button { background-color: #007bff; color: white; cursor: pointer; border: none; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
    </style>
</head>
<body>

    <h1>AI 문서 분석 및 번역 시스템</h1>
    <p>이미지나 텍스트 파일을 업로드하면 Google Gemini AI가 분석해 드립니다.</p>
    
    <div class="control-panel">
        <input type="file" id="fileInput" accept="image/*, .txt, .pdf" />
        
        <select id="languageSelect">
            <option value="ko">한국어</option>
            <option value="ja">일본어</option>
            <option value="zh">중국어</option>
            <option value="en">영어</option>
            <option value="vi">베트남어</option>
            <option value="th">태국어</option>
        </select>
        
        <button id="analyzeBtn" onclick="analyzeDocument()">문서 분석</button>
        <button id="ttsBtn" onclick="playAudio()" disabled>음성 지원</button>
    </div>

    <div class="result-section">
        <h3>[ 분석 결과 ]</h3>
        <p><strong>주제:</strong> <span id="topicOutput">-</span></p>
        <p><strong>주요 정보 및 할 일:</strong> <span id="extractOutput">-</span></p>
        <hr>
        <p><strong>전체 번역 내용:</strong></p>
        <p id="translationOutput" style="white-space: pre-wrap;">문서를 업로드하고 분석 버튼을 눌러주십시오.</p>
    </div>

    <audio id="audioPlayer" style="display:none;"></audio>

    <script>
        // 로컬/코드스페이스 테스트용 주소입니다. 
     const API_URL = "[https://crispy-memory-q7w4x4757w97h4rw6-8000.app.github.dev/analyze](https://crispy-memory-q7w4x4757w97h4rw6-8000.app.github.dev/analyze)";
        let currentAudioUrl = "";

        async function analyzeDocument() {
            const fileInput = document.getElementById('fileInput').files[0];
            const language = document.getElementById('languageSelect').value;

            if (!fileInput) {
                alert("주인님, 분석할 파일을 먼저 업로드해 주십시오.");
                return;
            }

            document.getElementById('translationOutput').innerText = "Google Gemini AI가 문서를 분석 중입니다...";
            const formData = new FormData();
            formData.append("file", fileInput);
            formData.append("target_language", language);

            try {
                const response = await fetch(API_URL, { method: "POST", body: formData });
                const result = await response.json();

                document.getElementById('topicOutput').innerText = result.topic;
                document.getElementById('extractOutput').innerText = result.extracted_info;
                document.getElementById('translationOutput').innerText = result.translated_text;

                if (result.audio_url) {
                    currentAudioUrl = result.audio_url;
                    document.getElementById('ttsBtn').disabled = false;
                }
            } catch (error) {
                console.error("오류:", error);
                document.getElementById('translationOutput').innerText = "서버 통신 중 오류가 발생했습니다.";
            }
        }

        function playAudio() {
            if (currentAudioUrl) {
                const audioPlayer = document.getElementById('audioPlayer');
                audioPlayer.src = currentAudioUrl;
                audioPlayer.play();
            }
        }
    </script>
</body>
</html>
